# ============================================================
# WORKFLOW: OKX Volume Bot
# Опис:
# Запуск volume-бота на OKX через GitHub Actions
#
# ВАЖЛИВО:
# - secrets ОБОВʼЯЗКОВО передані через env
# ============================================================

name: OKX Volume Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"   # кожні 15 хвилин (UTC)

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонування репозиторію
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Налаштування Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Встановлення залежностей
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Запуск бота
      - name: Run volume bot
        env:
          OKX_API_KEY: ${{ secrets.OKX_API_KEY }}
          OKX_API_SECRET: ${{ secrets.OKX_API_SECRET }}
          OKX_API_PASSPHRASE: ${{ secrets.OKX_API_PASSPHRASE }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python main.py
